    else if(s.fx==="minimal") document.body.classList.add("fx-min");
    const pal=THEMES[s.theme]||THEMES.green;
    for(const [k,v] of Object.entries(pal)) document.documentElement.style.setProperty(k,v);
  },
  renderVol(){
    const bar=$("#vol-bar");
    const n=Math.round(State.settings.volume*10);
    let html=""; for(let i=0;i<10;i++) html+="<i class='"+(i<n?"on":"")+"'></i>";
    if(bar) bar.innerHTML=html;
  },
  refresh(){
    this.renderVol();
    const fxb=$("#fx-btn"); if(fxb) fxb.textContent=State.settings.fx.toUpperCase();
    const thb=$("#theme-btn"); if(thb) thb.textContent=State.settings.theme.toUpperCase();
    const mb=$("#music-btn"); if(mb) mb.textContent=State.settings.music?"ON":"OFF";
  },
  open(focusImport){
    if(!this._wired) this.wire();
    this._prev = (State.mode==="login")?"login":(State.mode==="menu")?"menu":"terminal";
    State.mode="settings"; Term.showInput(false);
    $("#settings").classList.add("open");
    this.refresh();
    const im=$("#imp-msg");
    if(focusImport){
      if(im){ im.textContent="paste a campaign pack below and press LOAD. it is checked before it runs."; im.className="c-cyan"; }
      const area=$("#imp-area"); if(area && area.focus) try{ area.focus(); }catch(e){}
      if(area && area.scrollIntoView) try{ area.scrollIntoView(); }catch(e){}
    } else if(im){ im.textContent=""; im.className=""; }
  },
  close(){
    $("#settings").classList.remove("open");
    if(this._prev==="menu"){ State.mode="menu"; CampaignManager.openLibrary(false); return; }
    State.mode=this._prev;
    if(State.mode==="terminal"){ Term.setPrompt(State.prompt()); Term.showInput(true); }
  },
  cycleFx(){ const i=FX_LEVELS.indexOf(State.settings.fx); State.settings.fx=FX_LEVELS[(i+1)%FX_LEVELS.length]; this.apply(); this.refresh(); Save.write(); },
  cycleTheme(){ const i=THEME_KEYS.indexOf(State.settings.theme); State.settings.theme=THEME_KEYS[(i+1)%THEME_KEYS.length]; this.apply(); this.refresh(); Save.write(); },
  toggleMusic(){ State.settings.music=!State.settings.music; this.apply(); this.refresh(); if(State.settings.music && State.accessGranted) Audio.arpStart(); Audio.beep(); Save.write(); },
  vol(d){ State.settings.volume=Math.max(0,Math.min(1,Math.round((State.settings.volume+d)*10)/10)); this.apply(); this.renderVol(); Audio.beep(); Save.write(); },
  async importPack(){
    const area=$("#imp-area"), msg=$("#imp-msg");
    let raw=(area&&area.value)||"";
    if(!raw.trim()){ if(msg){msg.textContent="paste a campaign object first."; msg.className="c-amber";} return; }
    let obj;
    try { obj = (new Function("return ("+raw+")"))(); }
    catch(e){ if(msg){msg.textContent="parse error: "+e.message; msg.className="failnote";} return; }
    const issues=Validator.check(obj);
    if(issues.length){ if(msg){msg.innerHTML="rejected, not loaded:<br>"+issues.map(x=>"&bull; "+x).join("<br>"); msg.className="failnote";} return; }
    const fresh=!Campaigns.get(obj.id);
    obj._imported=true; obj._raw=raw;     // mark as player-imported so it can be saved
    Campaigns.register(obj);
    if(area) area.value="";
    if(msg){ msg.textContent=(fresh?"added":"updated")+" '"+obj.title+"'. it's now in your library."; msg.className="c-cyan"; }
    Save.write();
    this._prev="menu";          // send the player back to the library to see it listed
    setTimeout(()=>this.close(), 900);
  },
  wire(){
    this._wired=true;
    const on=(id,fn)=>{ const e=$(id); if(e) e.addEventListener("click",(ev)=>{ev.stopPropagation();fn();}); };
    on("#vol-down",()=>this.vol(-0.1)); on("#vol-up",()=>this.vol(0.1));
    on("#fx-btn",()=>this.cycleFx()); on("#theme-btn",()=>this.cycleTheme());
    on("#music-btn",()=>this.toggleMusic());
    on("#imp-load",()=>this.importPack());
  }
};

/* ---- in-engine campaign validator (mirrors the offline test checks) ---- */
const Validator = {
  check(c){
    const errs=[];
    if(!c || typeof c!=="object"){ return ["campaign is not an object."]; }
    if(!c.id) errs.push("missing 'id'.");
    if(!c.title) errs.push("missing 'title'.");
    if(!c.handler||!c.handler.name) errs.push("missing handler.name.");
    if(!Array.isArray(c.missions)||!c.missions.length){ errs.push("missions[] missing or empty."); return errs; }
    if(!c.ending && !c.endings) errs.push("needs 'ending' (array) or 'endings' (object).");
    if(c.finale){
      if(!Array.isArray(c.finale.options)||!c.finale.options.length) errs.push("finale.options[] missing.");
      else c.finale.options.forEach(o=>{ if(!c.endings||!c.endings[o.key]) errs.push("finale option '"+o.key+"' has no endings['"+o.key+"']."); });
    }
    if(c.continueCodes && c.continueCodes.length!==c.missions.length)
      errs.push("continueCodes length ("+c.continueCodes.length+") != mission count ("+c.missions.length+").");
    c.missions.forEach((m,i)=>{
      const tag="mission "+(i+1)+" ("+(m.codename||"?")+"): ";
      if(!Puzzles.has(m.puzzleId)) errs.push(tag+"unknown puzzleId '"+m.puzzleId+"'.");
      if(!m.unlockCmd) errs.push(tag+"missing unlockCmd.");
      else if(typeof Commands!=="undefined" && Commands.get && !Commands.get(m.unlockCmd)) errs.push(tag+"unlockCmd '"+m.unlockCmd+"' is not a registered command.");
      const t=c.targets&&c.targets[m.targetId];
      if(!t){ errs.push(tag+"targetId '"+m.targetId+"' not in targets."); return; }
      if(!t.files||!t.files[m.objective]) errs.push(tag+"objective '"+m.objective+"' not a file on "+m.targetId+".");
      // route solvability check when the spec is explicit
      if(m.puzzleId==="route" && m.puzzleSpec && m.puzzleSpec.walls){
        if(!routeSolvable(m.puzzleSpec)) errs.push(tag+"route maze is unsolvable.");
      }
      // decrypt sanity
      if(m.puzzleId==="decrypt" && m.puzzleSpec && m.puzzleSpec.plain && !/[A-Z]/.test(m.puzzleSpec.plain))
        errs.push(tag+"decrypt plain text has no letters to encode.");
    });
    return errs;
  }
};
function routeSolvable(spec){
  const w=spec.w||7,h=spec.h||6;
  const walls=new Set((spec.walls||[]).map(p=>p[0]+","+p[1]));
  const src=spec.src||[0,0], sink=(spec.sink||[h-1,w-1]).join(",");
  const q=[src.join(",")], seen=new Set([src.join(",")]);
  while(q.length){ const cell=q.shift(); if(cell===sink) return true;
    const [r,c]=cell.split(",").map(Number);
    for(const [dr,dc] of [[1,0],[-1,0],[0,1],[0,-1]]){ const nk=(r+dr)+","+(c+dc);
      if(r+dr<0||c+dc<0||r+dr>=h||c+dc>=w||walls.has(nk)||seen.has(nk)) continue; seen.add(nk); q.push(nk); } }
  return false;
}

/* boot directly into a campaign (used by import + menu) */
async function bootIntoCampaign(id){
  CampaignManager.load(id);
  State.connectedTo=null; State.accessGranted=false; State.downloaded={}; State.stash={}; State.filesSeen={};
  State.missionIndex=0; State.credits=0; State.tools={ scrubber:false, analyzer:false, failsafe:0 };
  State.history=[]; State.histIdx=0; State.choice=null;
  $("#hud-proof").textContent=State.credits;
  Audio.arpStop();
  Trace.reset();
  await Term.clear();
  State.mode="terminal"; State.busy=true; Term.showInput(false);
  await Game.intro();
  State.busy=false;
  Term.setPrompt(State.prompt()); Term.showInput(true); Line.clear();
}

/* ---- tab completion ---- */
function commonPrefix(arr){
  if(!arr.length) return ""; let p=arr[0];
  for(const s of arr){ while(!s.startsWith(p)) p=p.slice(0,-1); }
  return p;
}
async function tabComplete(){
  const buf=Line.buf; const parts=buf.split(/\s+/);
  let pool=[], frag="";
  if(parts.length<=1){ frag=parts[0]||""; pool=Commands.primary(); }
  else {
    const cmd=parts[0].toLowerCase(); frag=parts[parts.length-1];
    const fileCmds=["cat","read","open","more","download","get","exfil"];
    if(fileCmds.includes(cmd)) pool=State.target?Object.keys(State.target.files):Object.keys(State.stash);
    else if(cmd==="connect"||cmd==="dial"||cmd==="ssh"){ const m=State.mission; pool=m?[m.targetId]:[]; }
    else if(cmd==="buy") pool=SHOP.map(s=>s.key);
    else if(cmd==="man") pool=Commands.primary();
    else pool=[];
  }
  const cands=pool.filter(n=>n.startsWith(frag));
  if(!cands.length) return;
  if(cands.length===1){
    parts[parts.length-1]=cands[0]; Line.buf=parts.join(" "); Line.render(); Audio.type();
  } else {
    const pre=commonPrefix(cands);
    if(pre.length>frag.length){ parts[parts.length-1]=pre; Line.buf=parts.join(" "); Line.render(); }
    Term.echo(State.prompt(), buf);
    await Term.print("  "+cands.join("    "),{cls:"c-faint",instant:true});
  }
}

/* ========================== [BOOT / INIT] ================================= */
const Line = {
  buf:"",
  render(){ $("#cmd").textContent=this.buf; },
  clear(){ this.buf=""; this.render(); },
  add(ch){ if(this.buf.length<64){ this.buf+=ch; this.render(); } },
  back(){ this.buf=this.buf.slice(0,-1); this.render(); }
};

const Boot = {
  powered:false,
  async powerOn(){
    if(this.powered) return; this.powered=true;
    Audio.init(); Audio.beep(); Audio.humStart();
    $("#power-led").classList.add("on");
    await Term.clear();
    State.mode="boot"; Term.showInput(false);
    const b={cls:"c-dim", speed:CONFIG.bootSpeed};
    await Term.print("AFTERWARE   //   PHOSPHOR BIOS v3.7", b);
    await Term.print("(c) blackboard systems  --  no warranty, no mercy", b);
    await Term.blank();
    await Term.print("memory check ............ 640K OK", b);
    await Term.print("rom modules ............. loaded", b);
    await Term.print("crypto co-processor ..... present", b);
    await Term.print("modem ................... INIT", b);
    Audio.modem(); await sleep(900);
    await Term.print("modem ................... 2400 baud carrier locked", b);
    await Term.print("net stack ............... up", b);
    await Term.blank();
    await Term.print("establishing anonymous uplink ...", {cls:"c-faint", speed:CONFIG.bootSpeed});
    await sleep(500);
    await Term.print("uplink secured. routing scrambled.", {cls:"c-faint", speed:CONFIG.bootSpeed});
    await Term.blank();
    for(const l of LOGO) await Term.print(l,{cls:"logo-line bright",instant:true});
    await Term.print("        what's left of you keeps running.",{cls:"c-dim"});
    await Term.blank();
    Term.setPrompt("operator handle: ");
    State.mode="login"; Term.showInput(true); Line.clear();
  },
  async enter(){
    State.mode="terminal"; State.busy=true; Term.showInput(false);
    await Game.intro();
    State.busy=false;
    Term.setPrompt(State.prompt()); Term.showInput(true); Line.clear();
  }
};

async function submitLine(){
  const text=Line.buf;
  if(State.mode==="login"){
    State.busy=true; Term.showInput(false);
    const h=(text.trim()||"ghost").replace(/\s+/g,"_").slice(0,16);
    State.user=h; $("#hud-user").textContent=h;
    Term.echo($("#prompt").textContent, text); Line.clear();
    await Term.print("handle accepted. welcome to the deck, "+h+".",{cls:"c-dim"});
    await Term.print("returning operator? reload with 'resume <code>' using the note by your screen.",{cls:"c-dim"});
    await Term.blank();
    $("#hud").classList.add("live"); Trace.render();
    CampaignManager.start();
    return;
  }
  if(State.mode==="terminal"){
    Term.echo(State.prompt(), text); Line.clear();
    if(text.trim()){ State.history.push(text); if(State.history.length>50) State.history.shift(); }
    State.histIdx=State.history.length;
    State.busy=true; Term.showInput(false);
    await Commands.run(text);
    State.busy=false;
    if(State.mode==="terminal"){ Term.setPrompt(State.prompt()); Term.showInput(true); }
  }
}

function onKey(e){
  if(State.mode==="off"){ e.preventDefault(); Boot.powerOn(); return; }
  if(State.mode==="boot"||State.mode==="end"){ return; }
  if(State.mode==="settings"){
    if(e.key==="Escape"){ e.preventDefault(); Settings.close(); }
    return;
  }
  if(State.mode==="choice"){
    if(/^[1-9]$/.test(e.key)){ e.preventDefault(); Audio.key(); Game.pickChoice(parseInt(e.key,10)); }
    return;
  }
  if(State.mode==="puzzle"){
    if(e.key==="Escape"){ e.preventDefault(); Puzzles.abort(); return; }
    if(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"," "].includes(e.key)||e.code==="Space"||e.key==="Backspace"||e.key==="Enter") e.preventDefault();
    Puzzles.input(e); return;
  }
  if(State.mode==="menu"){
    if(/^[1-9]$/.test(e.key)){ Audio.key(); CampaignManager.pickMenu(parseInt(e.key,10)); return; }
    if(e.key==="a"||e.key==="A"){ CampaignManager.addFromLibrary(); return; }
    if(e.key==="c"||e.key==="C"){ const sv=State._save; if(sv&&sv.run&&sv.run.campaign&&Campaigns.get(sv.run.campaign)){ Audio.key(); CampaignManager.restoreRun(); } return; }
    return;
  }
  // login / terminal line editing
  if(State.busy) return;
  if(e.key==="Enter"){ e.preventDefault(); submitLine(); return; }
  if(e.key==="Backspace"){ e.preventDefault(); Audio.key(); Line.back(); return; }
  if(State.mode==="terminal"){
    if(e.key==="Tab"){ e.preventDefault(); tabComplete(); return; }
    if(e.key==="ArrowUp"){ e.preventDefault(); histRecall(-1); return; }
    if(e.key==="ArrowDown"){ e.preventDefault(); histRecall(1); return; }
  }
  if(e.key.length===1 && !e.ctrlKey && !e.metaKey && !e.altKey){ Audio.key(); Line.add(e.key); }
}

/* command-history recall (up/down) */
function histRecall(dir){
  const h=State.history; if(!h.length) return;
  State.histIdx += dir;
  if(State.histIdx<0) State.histIdx=0;
  if(State.histIdx>=h.length){ State.histIdx=h.length; Line.buf=""; Line.render(); return; }
  Line.buf=h[State.histIdx]; Line.render();
}

function init(){
  window.addEventListener("keydown", onKey);
  document.addEventListener("click", (e)=>{
    if(State.mode==="off"){ Boot.powerOn(); }
    if(Audio.init) Audio.init();
  });
  $("#mute").addEventListener("click",(e)=>{
    e.stopPropagation();
    const m=Audio.toggleMute();
    e.currentTarget.classList.toggle("muted", m);
    e.currentTarget.innerHTML = m ? "&#9834; OFF" : "&#9835; SND";
  });
  FX.init();
  // load any local save: settings, imported campaigns, and a resumable run
  const saved=Save.read();
  if(saved){ Save.applySettings(saved); Save.restorePacks(saved); State._save=saved; }
  Settings.wire();
  Settings.apply();
  // initial power-off splash
  Term.showInput(false);
  Term.instant("",);
  for(const l of LOGO) Term.instant(l,"logo-line bright");
  Term.instant("",);
  Term.instant("        what's left of you keeps running.","c-dim");
  Term.instant("",);
  Term.instant("        press any key or click to power on","c-amber");
  State.mode="off";
}
init();
